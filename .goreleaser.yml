version: 2

project_name: papersilm

before:
  hooks:
    - go test ./...

builds:
  - id: papersilm
    main: ./cmd/papersilm
    binary: papersilm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/zzqDeco/papersilm/internal/version.Version={{ .Version }} -X github.com/zzqDeco/papersilm/internal/version.Commit={{ .Commit }} -X github.com/zzqDeco/papersilm/internal/version.Date={{ .Date }}

archives:
  - id: default
    ids:
      - papersilm
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

source:
  enabled: false

release:
  draft: false
  prerelease: auto

changelog:
  sort: asc
